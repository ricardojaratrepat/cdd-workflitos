<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Client-Driven Development · Workflitos · Bukathon</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" />
<style>
  @font-face {
    font-family: "Nunito Sans";
    font-style: normal;
    font-weight: 300 900;
    font-display: swap;
    src: url("./fonts/NunitoSans-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Nunito Sans";
    font-style: normal;
    font-weight: 300 900;
    font-display: swap;
    src: url("./fonts/NunitoSans-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  :root{
    /* Buk Design System tokens — light theme */
    --primary-100: #D9E2F9;
    --primary-300: #6C87D8;
    --primary-500: #2F4DAA;
    --primary-700: #223A92;
    --primary-800: #172A7A;
    --primary-900: #091351;
    --danger-500:  #F95E50;
    --success-500: #6BC64C;
    --secondary-500: #F99304;
    --purple-500: #6B4FBB;

    --basic-20:  #FAFCFD;
    --basic-100: #F6F7F9;
    --basic-200: #F0F1F3;
    --basic-300: #E4E5E7;
    --basic-400: #C1C2C4;
    --basic-500: #A3A4A5;
    --basic-600: #797A7C;
    --basic-700: #656668;
    --basic-900: #242527;

    --bg:        #FFFFFF;
    --bg-page:   #FAFCFD;
    --ink:       #091351;   /* headings / display — navy */
    --ink-dim:   #242527;   /* body text */
    --muted:     #797A7C;   /* secondary labels */

    --accent:    var(--primary-500);
    --accent-2:  var(--success-500);

    --display:   "Nunito Sans", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono:      "JetBrains Mono", ui-monospace, "SF Mono", "Menlo", monospace;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg-page); color:var(--ink-dim); font-family:var(--display); overflow:hidden; }
  button{ font-family:inherit; }

  /* loading splash */
  .splash{
    position:fixed; inset:0; display:grid; place-items:center;
    z-index:200;
    background:
      radial-gradient(800px 500px at 50% 50%, rgba(108,135,216,0.10), transparent 60%),
      var(--bg-page);
    transition: opacity 0.8s ease;
    pointer-events:none;
  }
  .splash.gone{ opacity:0; }
  .splash .mark{
    font-family:var(--mono); font-size:14px; letter-spacing:0.35em; text-transform:uppercase; color:var(--muted);
  }
  .splash .dot{
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 18px rgba(47,77,170,0.5);
    margin-right:14px; display:inline-block; vertical-align:middle;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.4; transform:scale(.8)} }

  ::selection{ background: rgba(47,77,170,0.18); color: var(--primary-900); }

  /* Material Symbols ligature class */
  .ms-icon {
    font-family: "Material Symbols Outlined";
    font-weight: normal;
    font-style: normal;
    display: inline-block;
    line-height: 1;
    text-transform: none;
    letter-spacing: normal;
    word-wrap: normal;
    white-space: nowrap;
    direction: ltr;
    font-feature-settings: "liga";
    -webkit-font-feature-settings: "liga";
    -webkit-font-smoothing: antialiased;
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 48;
  }
</style>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#FAFCFD"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="#2F4DAA" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="40" fill="none" stroke="#2F4DAA" stroke-width="1" opacity="0.6"/>
    <circle cx="100" cy="100" r="20" fill="#2F4DAA" opacity="0.8"/>
    <text x="100" y="180" font-family="sans-serif" font-size="9" fill="#091351" text-anchor="middle" letter-spacing="2">CDD · WORKFLITOS</text>
  </svg>
</template>
</head>

<body>

  <div class="splash" id="splash">
    <div class="mark"><span class="dot"></span>CDD · Workflitos · Iniciando</div>
  </div>

  <div id="root"></div>

  <!-- importmap so framer-motion + react share a single React instance -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "framer-motion": "https://esm.sh/framer-motion@11.18.0?external=react,react-dom"
    }
  }
  </script>

  <!-- bootstrap: resolve ESM deps, then Babel, then our JSX -->
  <script type="module">
    (async () => {
      try {
        const ReactNS         = await import("react");
        const ReactDOMClient  = await import("react-dom/client");
        const FramerMotion    = await import("framer-motion");
        window.React          = ReactNS.default || ReactNS;
        // some bundlers wrap default; make sure named exports are also on .React
        for (const k of Object.keys(ReactNS))     if (!(k in window.React)) window.React[k] = ReactNS[k];
        window.ReactDOM       = ReactDOMClient.default || ReactDOMClient;
        for (const k of Object.keys(ReactDOMClient)) if (!(k in window.ReactDOM)) window.ReactDOM[k] = ReactDOMClient[k];
        window.FramerMotion   = FramerMotion.default ? Object.assign({}, FramerMotion, FramerMotion.default) : FramerMotion;

        // Load Babel standalone (pinned)
        await new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = "https://unpkg.com/@babel/standalone@7.29.0/babel.min.js";
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });

        // Fetch + transform + execute our JSX in strict order (cache-busted)
        const cb = Date.now();
        const FILES = ["cdd/ui.jsx", "cdd/slides-a.jsx", "cdd/slides-b.jsx", "cdd/slides-c.jsx", "cdd/app.jsx"];
        for (const url of FILES) {
          const src  = await fetch(url + "?v=" + cb).then(r => r.text());
          const code = window.Babel.transform(src, { presets: ["react"], filename: url }).code;
          const tag  = document.createElement("script");
          tag.text   = code + `\n//# sourceURL=${url}`;
          document.body.appendChild(tag);
        }

        // dismiss splash
        const splash = document.getElementById("splash");
        if (splash) {
          splash.classList.add("gone");
          setTimeout(() => splash.remove(), 900);
        }
      } catch (err) {
        console.error("Bootstrap failed:", err);
        const splash = document.getElementById("splash");
        if (splash) splash.innerHTML = `<div style="color:#F95E50; font-family: var(--mono); font-size:14px; text-align:center; max-width:600px; padding:0 40px;">Error iniciando el deck:<br/><br/>${(err && err.message) || err}</div>`;
      }
    })();
  </script>

</body>
</html>
